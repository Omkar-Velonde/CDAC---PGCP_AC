<!doctype html>
<html>
  <head>
    <title>Exercise 3</title>
  </head>
  <body>
    <script>
      function fetchData(url, callback) {
        console.log("Fetching data from:", url);

        setTimeout(() => {
          const response = "Data received from " + url;
          callback(response);
        }, 2000);
      }

      fetchData("https://www.google.com", function (response) {
        console.log(response);
      });
    </script>
  </body>
</html>
