<!doctype html>
<html>
  <head>
    <title>Exercise 2</title>
  </head>
  <body>
    <script>
      function forEachElement(arr, callback) {
        for (let i = 0; i < arr.length; i++) {
          callback(arr[i], i);
        }
      }

      let arr = [3, 5, 6, 3, 4, 7, 9, 3];
      forEachElement(arr, function (element, index) {
        console.log(`Index ${index}: ${element * 2}`);
      });
    </script>
  </body>
</html>
