<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Registration <span>Form</span></h1>
      <p class="subtitle">
        Fill the form with your personal and address details.
      </p>

      <!-- PERSONAL INFO -->
      <h2>Personal Information</h2>

      <div class="grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Nickname</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" />
        </div>

        <div class="form-group">
          <label>Place of Birth</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" />
        </div>

        <div class="form-group">
          <label>Nationality</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="radio">
            <label><input type="radio" name="gender" /> Male</label>
            <label><input type="radio" name="gender" /> Female</label>
          </div>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Marital Status</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Country</label>
          <input type="text" />
        </div>
      </div>

      <!-- ADDRESS -->
      <h2>Address</h2>

      <div class="grid">
        <div class="form-group full">
          <label>Present Address</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>State</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Zip Code</label>
          <input type="text" />
        </div>
      </div>

      <!-- BUTTON -->
      <div class="btn-box">
        <button>Submit</button>
      </div>

      <div class="btn-box">
        <button>Reset</button>
      </div>
    </div>
  </body>
</html>
